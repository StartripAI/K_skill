<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">K.skill prompt stack social inspector</title>
  <desc id="desc">A social-feed style prompt stack inspector with identity, voice, memory, evidence, safety, and reply layers.</desc>
  <defs>
    <linearGradient id="stackBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8f3ec"/>
      <stop offset=".45" stop-color="#eef0ff"/>
      <stop offset="1" stop-color="#e8f6ee"/>
    </linearGradient>
    <filter id="stackShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#1e1a16" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="1200" height="520" rx="36" fill="url(#stackBg)"/>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <text x="70" y="78" font-size="34" font-weight="850" fill="#151515">Prompt Stack, but readable like a feed</text>
    <text x="70" y="114" font-size="17" fill="#5f574f">Every layer says what it is, where it came from, and how confident K.skill is.</text>

    <g filter="url(#stackShadow)">
      <rect x="78" y="158" width="300" height="260" rx="34" fill="#151515"/>
      <text x="118" y="212" font-size="30" font-weight="850" fill="#fffaf2">Reply preview</text>
      <rect x="118" y="252" width="206" height="58" rx="20" fill="#fffaf2"/>
      <text x="142" y="287" font-size="15" fill="#151515">TA opened a topic.</text>
      <rect x="164" y="332" width="174" height="58" rx="20" fill="#dff3e9"/>
      <text x="188" y="367" font-size="15" fill="#151515">Ask lightly.</text>
    </g>

    <g filter="url(#stackShadow)">
      <rect x="448" y="132" width="306" height="70" rx="24" fill="#fffaf2"/>
      <circle cx="488" cy="167" r="18" fill="#ff6f61"/>
      <text x="522" y="160" font-size="15" font-weight="850" fill="#151515">Identity</text>
      <text x="522" y="184" font-size="13" fill="#5f574f">role, voice, allowed uses</text>

      <rect x="448" y="222" width="306" height="70" rx="24" fill="#e8f6ee"/>
      <circle cx="488" cy="257" r="18" fill="#31c7a2"/>
      <text x="522" y="250" font-size="15" font-weight="850" fill="#151515">Memory</text>
      <text x="522" y="274" font-size="13" fill="#365049">episodes, facts, corrections</text>

      <rect x="448" y="312" width="306" height="70" rx="24" fill="#ffe9ba"/>
      <circle cx="488" cy="347" r="18" fill="#ffbd59"/>
      <text x="522" y="340" font-size="15" font-weight="850" fill="#151515">Evidence</text>
      <text x="522" y="364" font-size="13" fill="#66501f">quote, claim, confidence</text>

      <rect x="448" y="402" width="306" height="70" rx="24" fill="#ffe7d8"/>
      <circle cx="488" cy="437" r="18" fill="#f0725c"/>
      <text x="522" y="430" font-size="15" font-weight="850" fill="#151515">Safety</text>
      <text x="522" y="454" font-size="13" fill="#6b4b3f">no pressure, no impersonation</text>
    </g>

    <g filter="url(#stackShadow)">
      <rect x="826" y="158" width="296" height="260" rx="34" fill="#fffaf2"/>
      <text x="866" y="212" font-size="28" font-weight="850" fill="#151515">Inspector</text>
      <text x="866" y="244" font-size="15" fill="#5f574f">Before export, check:</text>
      <rect x="866" y="282" width="200" height="34" rx="17" fill="#151515"/>
      <text x="892" y="304" font-size="13" font-weight="850" fill="#fffaf2">boundary layer present</text>
      <rect x="866" y="332" width="200" height="34" rx="17" fill="#eef0ff"/>
      <text x="892" y="354" font-size="13" font-weight="850" fill="#151515">source confidence shown</text>
      <rect x="866" y="382" width="200" height="34" rx="17" fill="#e8f6ee"/>
      <text x="892" y="404" font-size="13" font-weight="850" fill="#151515">target format ready</text>
    </g>
  </g>
</svg>
