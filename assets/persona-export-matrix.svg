<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">K.skill persona export matrix</title>
  <desc id="desc">A matrix showing one K.skill persona pack compiled into Codex, Claude, ChatGPT, DeepSeek, SillyTavern, Hermes, LobeChat, and Open WebUI.</desc>
  <defs>
    <linearGradient id="matrixBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset=".5" stop-color="#fff8eb"/>
      <stop offset="1" stop-color="#e8f6ee"/>
    </linearGradient>
    <filter id="matrixShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#1a1a1a" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="1200" height="520" rx="36" fill="url(#matrixBg)"/>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <text x="64" y="82" font-size="34" font-weight="850" fill="#151515">One Persona Pack, many homes</text>
    <text x="64" y="118" font-size="17" fill="#5f574f">Compile the same evidence-grounded persona into the tools people already use.</text>

    <g filter="url(#matrixShadow)">
      <rect x="72" y="174" width="310" height="216" rx="30" fill="#151515"/>
      <text x="116" y="228" font-size="30" font-weight="850" fill="#fffaf2">persona.yaml</text>
      <text x="116" y="262" font-size="15" fill="#e4d8c8">identity · memory · sources</text>
      <text x="116" y="292" font-size="15" fill="#e4d8c8">evidence · confidence · evals</text>
      <rect x="116" y="324" width="196" height="42" rx="18" fill="#31c7a2"/>
      <text x="147" y="351" font-size="14" font-weight="800" fill="#151515">Prompt Stack ready</text>
    </g>

    <path d="M414 282H506" stroke="#151515" stroke-width="4" stroke-linecap="round"/>
    <path d="M494 268l18 14-18 14" fill="none" stroke="#151515" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <g filter="url(#matrixShadow)" font-size="15">
      <rect x="542" y="150" width="250" height="82" rx="22" fill="#fffaf2"/>
      <text x="574" y="184" font-size="18" font-weight="850" fill="#151515">Codex / Claude</text>
      <text x="574" y="210" fill="#5f574f">SKILL.md + references</text>

      <rect x="832" y="150" width="250" height="82" rx="22" fill="#eef0ff"/>
      <text x="864" y="184" font-size="18" font-weight="850" fill="#151515">ChatGPT</text>
      <text x="864" y="210" fill="#5f574f">instructions + knowledge</text>

      <rect x="542" y="258" width="250" height="82" rx="22" fill="#e8f6ee"/>
      <text x="574" y="292" font-size="18" font-weight="850" fill="#151515">DeepSeek</text>
      <text x="574" y="318" fill="#365049">system-prompt.json</text>

      <rect x="832" y="258" width="250" height="82" rx="22" fill="#ffe7d8"/>
      <text x="864" y="292" font-size="18" font-weight="850" fill="#151515">SillyTavern</text>
      <text x="864" y="318" fill="#6b4b3f">Character Card V2 + lorebook</text>

      <rect x="542" y="366" width="250" height="82" rx="22" fill="#ffe9ba"/>
      <text x="574" y="400" font-size="18" font-weight="850" fill="#151515">Hermes</text>
      <text x="574" y="426" fill="#66501f">SOUL.md + skills</text>

      <rect x="832" y="366" width="250" height="82" rx="22" fill="#f3f0ec"/>
      <text x="864" y="400" font-size="18" font-weight="850" fill="#151515">Lobe / Open WebUI</text>
      <text x="864" y="426" fill="#5f574f">agent JSON</text>
    </g>
  </g>
</svg>
