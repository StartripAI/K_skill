<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">K.skill direct message flow</title>
  <desc id="desc">A social direct-message workflow showing chat import, relationship signal analysis, Reply Lab drafts, and boundary-safe sending.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ec"/>
      <stop offset=".52" stop-color="#e8f6ee"/>
      <stop offset="1" stop-color="#eef0ff"/>
    </linearGradient>
    <linearGradient id="story" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff6f61"/>
      <stop offset=".45" stop-color="#ffbd59"/>
      <stop offset="1" stop-color="#31c7a2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#23180f" flood-opacity=".15"/>
    </filter>
  </defs>
  <rect width="1200" height="520" rx="36" fill="url(#bg)"/>
  <path d="M0 410 C142 336 228 473 358 374 C488 275 612 345 746 270 C909 178 1008 260 1200 177 L1200 520 L0 520 Z" fill="#ffd9c2" opacity=".7"/>

  <g filter="url(#shadow)">
    <rect x="62" y="54" width="306" height="412" rx="38" fill="#151515"/>
    <rect x="78" y="74" width="274" height="372" rx="28" fill="#fffaf2"/>
    <text x="104" y="117" font-family="Georgia,serif" font-size="26" font-weight="700" fill="#151515">DM import</text>
    <circle cx="302" cy="106" r="14" fill="#151515"/>
    <path d="M296 106h12M302 100v12" stroke="#fffaf2" stroke-width="2" stroke-linecap="round"/>
    <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
      <circle cx="119" cy="159" r="24" fill="url(#story)"/>
      <circle cx="119" cy="159" r="18" fill="#fffaf2"/>
      <text x="109" y="167" font-size="16" font-weight="800" fill="#151515">Me</text>
      <circle cx="177" cy="159" r="24" fill="url(#story)"/>
      <circle cx="177" cy="159" r="18" fill="#f8dccd"/>
      <text x="168" y="167" font-size="16" font-weight="800" fill="#151515">TA</text>

      <rect x="104" y="214" width="202" height="48" rx="18" fill="#151515"/>
      <text x="126" y="244" font-size="15" fill="#fffaf2">Me: weekend exhibit?</text>
      <rect x="132" y="282" width="188" height="64" rx="18" fill="#dff3e9"/>
      <text x="154" y="307" font-size="15" font-weight="700" fill="#151515">TA: maybe!</text>
      <text x="154" y="331" font-size="14" fill="#365049">do you like it too?</text>
      <rect x="104" y="376" width="214" height="38" rx="16" fill="#ffe9ba"/>
      <text x="126" y="400" font-size="14" font-weight="700" fill="#151515">source stays local</text>
    </g>
  </g>

  <g filter="url(#shadow)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <rect x="424" y="70" width="326" height="376" rx="34" fill="#fffaf2" stroke="#151515" stroke-opacity=".08"/>
    <text x="466" y="123" font-size="28" font-weight="800" fill="#151515">Crush Coach</text>
    <text x="466" y="154" font-size="15" fill="#625a51">Signals before strategy.</text>
    <rect x="466" y="192" width="224" height="44" rx="18" fill="#151515"/>
    <text x="492" y="221" font-size="15" font-weight="800" fill="#fffaf2">Stage: warm · 76%</text>
    <rect x="466" y="262" width="100" height="82" rx="20" fill="#e8f6ee"/>
    <text x="489" y="294" font-size="14" font-weight="800" fill="#151515">Warmth</text>
    <text x="500" y="325" font-size="30" font-weight="800" fill="#151515">3</text>
    <rect x="590" y="262" width="100" height="82" rx="20" fill="#ffe7d8"/>
    <text x="622" y="294" font-size="14" font-weight="800" fill="#151515">Risk</text>
    <text x="630" y="325" font-size="30" font-weight="800" fill="#151515">0</text>
    <rect x="466" y="370" width="224" height="42" rx="18" fill="#eef0ff"/>
    <text x="493" y="397" font-size="14" font-weight="800" fill="#151515">Evidence + confidence</text>
  </g>

  <g filter="url(#shadow)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <rect x="806" y="54" width="332" height="412" rx="38" fill="#151515"/>
    <text x="850" y="113" font-size="28" font-weight="800" fill="#fffaf2">Reply Lab</text>
    <text x="850" y="144" font-size="15" fill="#e4d8c8">Three sendable drafts, no pressure.</text>
    <rect x="850" y="190" width="240" height="64" rx="20" fill="#fffaf2"/>
    <text x="876" y="216" font-size="14" font-weight="800" fill="#151515">Safe</text>
    <text x="876" y="239" font-size="13" fill="#5f574f">Ask one easy question.</text>
    <rect x="850" y="274" width="240" height="64" rx="20" fill="#dff3e9"/>
    <text x="876" y="300" font-size="14" font-weight="800" fill="#151515">Playful</text>
    <text x="876" y="323" font-size="13" fill="#365049">Warm, not oily.</text>
    <rect x="850" y="358" width="240" height="64" rx="20" fill="#ffe7d8"/>
    <text x="876" y="384" font-size="14" font-weight="800" fill="#151515">Invite</text>
    <text x="876" y="407" font-size="13" fill="#6b4b3f">Leave an easy out.</text>
  </g>
</svg>
