    <rect x="1134" y="424" width="106" height="38" rx="19" fill="#31c7a2"/>
    <text x="1158" y="449" font-size="13" font-weight="800" fill="#151515">Claude</text>
    <rect x="1014" y="478" width="106" height="38" rx="19" fill="#ffe7d8"/>
    <text x="1036" y="503" font-size="13" font-weight="800" fill="#151515">ChatGPT</text>
    <rect x="1134" y="478" width="106" height="38" rx="19" fill="#ffe9a8"/>
    <text x="1152" y="503" font-size="13" font-weight="800" fill="#151515">DeepSeek</text>
    <rect x="1014" y="532" width="226" height="38" rx="19" fill="#2f3a4a"/>
    <text x="1048" y="557" font-size="13" font-weight="800" fill="#fffaf2">SillyTavern · Hermes · Lobe</text>
