<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="810" viewBox="0 0 1440 810" role="img" aria-labelledby="title desc">
  <title id="title">K.skill social persona hero</title>
  <desc id="desc">A social-app style hero image showing stories, direct messages, Crush Coach suggestions, character personas, and portable exports.</desc>
  <defs>
    <linearGradient id="sunset" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff6f61"/>
      <stop offset=".42" stop-color="#ffb347"/>
      <stop offset=".72" stop-color="#31c7a2"/>
      <stop offset="1" stop-color="#283044"/>
